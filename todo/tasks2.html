<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --black: #000000;
    --card: #0A0A0A;
    --card-border: rgba(255,255,255,0.08);
    --surface: #111111;
    --surface-hover: #161616;
    --surface-active: #1a1a1a;
    --white: #FFFFFF;
    --gray-1: #888888;
    --gray-2: #555555;
    --gray-3: #333333;
    --gray-4: #222222;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 340ms cubic-bezier(0.4, 0, 0.2, 1);
    --shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 24px 64px rgba(0,0,0,0.8), 0 8px 24px rgba(0,0,0,0.6);
  }

  html,
body {
  height: 100%;
  margin: 0;
  color: var(--white);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 60px 20px 80px;

  background-color: #030303;

background-image:
  radial-gradient(
    circle at top right,
    rgba(80, 60, 100, 0.04),
    transparent 45%
  ),

  radial-gradient(
    circle at bottom left,
    rgba(40, 70, 90, 0.04),
    transparent 50%
  );

  overflow-x: hidden;
}
  #starfield {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.app {
  position: relative;
  z-index: 10;
}
  .app {
    width: 100%;
    max-width: 640px;
  }

  /* ── HEADER ── */
  .header {
    margin-bottom: 36px;
    padding: 0 4px;
  }

  .header-title {
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .header-date {
    font-size: 13px;
    font-weight: 400;
    color: var(--gray-1);
    letter-spacing: 0.01em;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ── INPUT SECTION ── */
  .input-section {
    padding: 20px 20px 0;
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .task-input-wrap {
    flex: 1;
    position: relative;
  }

  .task-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--gray-3);
    border-radius: var(--radius-md);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 13px 16px;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    caret-color: var(--white);
  }

  .task-input::placeholder {
    color: var(--gray-2);
    font-weight: 300;
  }

  .task-input:hover {
    background: var(--surface-hover);
    border-color: var(--gray-2);
  }

  .task-input:focus {
    background: var(--surface-hover);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04), inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  .add-btn {
    background: var(--white);
    color: var(--black);
    border: none;
    border-radius: var(--radius-md);
    padding: 13px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition), background var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .add-btn:hover {
    opacity: 0.88;
    transform: translateY(-1px);
  }

  .add-btn:active {
    transform: translateY(0);
    opacity: 0.75;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--card-border);
    margin: 16px 20px 0;
  }

  /* ── TASK LIST ── */
  .task-list {
    padding: 8px 12px;
    min-height: 60px;
    max-height: 420px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--gray-3) transparent;
  }

  .task-list::-webkit-scrollbar {
    width: 4px;
  }

  .task-list::-webkit-scrollbar-track {
    background: transparent;
  }

  .task-list::-webkit-scrollbar-thumb {
    background: var(--gray-3);
    border-radius: 4px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--gray-2);
    font-size: 13px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.01em;
    text-align: center;
  }

  /* ── TASK ITEM ── */
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 8px;
    border-radius: var(--radius-md);
    group: true;
    transition: background var(--transition);
    animation: slideIn var(--transition-slow) cubic-bezier(0.34, 1.4, 0.64, 1) both;
    position: relative;
    cursor: pointer;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes slideOut {
    from {
      opacity: 1;
      transform: translateY(0) scale(1);
      max-height: 60px;
    }
    to {
      opacity: 0;
      transform: translateY(-4px) scale(0.97);
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
    }
  }

  .task-item.removing {
    animation: slideOut 280ms cubic-bezier(0.4, 0, 1, 1) both;
    overflow: hidden;
    pointer-events: none;
  }

  .task-item:hover {
    background: var(--surface-hover);
  }

  .task-item:hover .task-delete {
    opacity: 1;
  }

  /* ── CHECKBOX ── */
  .task-check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--gray-3);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color var(--transition), background var(--transition), transform var(--transition);
    position: relative;
    overflow: hidden;
  }

  .task-check:hover {
    border-color: var(--gray-1);
    transform: scale(1.08);
  }

  .task-check .check-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.4);
    transition: opacity 200ms ease, transform 260ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .task-check .check-inner svg {
    width: 10px;
    height: 10px;
    stroke: var(--black);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .task-item.completed .task-check {
    background: var(--white);
    border-color: var(--white);
    transform: scale(1);
  }

  .task-item.completed .task-check .check-inner {
    opacity: 1;
    transform: scale(1);
  }

  /* ── TASK TEXT ── */
  .task-text-wrap {
    flex: 1;
    min-width: 0;
  }

  .task-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color var(--transition), opacity var(--transition);
    cursor: text;
  }

  .task-item.completed .task-text {
    color: var(--gray-2);
    text-decoration: line-through;
    text-decoration-color: var(--gray-3);
    opacity: 0.7;
  }

  /* ── EDIT INPUT ── */
  .task-edit-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    padding: 1px 2px;
    width: 100%;
    caret-color: var(--white);
  }

  /* ── DELETE BUTTON ── */
  .task-delete {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--gray-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--transition), color var(--transition), background var(--transition);
  }

  .task-delete:hover {
    color: var(--white);
    background: var(--surface-active);
  }

  .task-delete svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 18px;
    border-top: 1px solid var(--card-border);
  }

  .footer-bars {
    display: flex;
    gap: 10px;
    flex: 1;
  }

  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bar-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--gray-2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .bar-track {
    height: 5px;
    background: var(--gray-4);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--white);
    border-radius: 99px;
    width: 0%;
    transition: width 380ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    body {
      padding: 32px 12px 60px;
    }

    .header {
      margin-bottom: 24px;
    }

    .input-section {
      flex-direction: column;
      padding: 16px 16px 0;
    }

    .add-btn {
      width: 100%;
      text-align: center;
    }

    .footer-bars {
      gap: 8px;
    }
  }

  @media (min-width: 900px) {
    body {
      padding: 80px 20px 80px;
    }
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="app">
  <header class="header">
    <h1 class="header-title">Tasks</h1>
    <p class="header-date" id="currentDate"></p>
  </header>

  <main class="card">
    <div class="input-section">
      <div class="task-input-wrap">
        <input
          class="task-input"
          id="taskInput"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
          spellcheck="false"
          maxlength="200"
        />
      </div>
      <button class="add-btn" id="addBtn" aria-label="Add task">Add</button>
    </div>

    <div class="divider"></div>

    <ul class="task-list" id="taskList" role="list" aria-label="Task list"></ul>

    <footer class="footer">
      <div class="footer-bars">
        <div class="bar-group">
          <span class="bar-label">Done</span>
          <div class="bar-track" role="progressbar" aria-label="Completed tasks" id="doneBarWrap">
            <div class="bar-fill" id="doneBar"></div>
          </div>
        </div>
        <div class="bar-group">
          <span class="bar-label">Left</span>
          <div class="bar-track" role="progressbar" aria-label="Remaining tasks" id="leftBarWrap">
            <div class="bar-fill" id="leftBar"></div>
          </div>
        </div>
      </div>
    </footer>
  </main>
</div>
<script>
const STAR_COLOR = '#fff';
const STAR_SIZE = 3;
const STAR_MIN_SCALE = 0.2;
const OVERFLOW_THRESHOLD = 50;
const STAR_COUNT = (window.innerWidth + window.innerHeight) / 8;

const canvas = document.getElementById('starfield');
const context = canvas.getContext('2d');

let scale = 1;
let width;
let height;

let stars = [];

let pointerX;
let pointerY;

let velocity = {
  x: 0,
  y: 0,
  tx: 0,
  ty: 0,
  z: 0.0005
};

let touchInput = false;

generate();
resize();
step();

window.addEventListener('resize', resize);

canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('touchmove', onTouchMove);
canvas.addEventListener('touchend', onMouseLeave);
document.addEventListener('mouseleave', onMouseLeave);

function generate() {
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: 0,
      y: 0,
      z: STAR_MIN_SCALE + Math.random() * (1 - STAR_MIN_SCALE)
    });
  }
}

function placeStar(star) {
  star.x = Math.random() * width;
  star.y = Math.random() * height;
}

function recycleStar(star) {
  let direction = 'z';

  let vx = Math.abs(velocity.x);
  let vy = Math.abs(velocity.y);

  if (vx > 1 || vy > 1) {
    let axis;

    if (vx > vy) {
      axis = Math.random() < vx / (vx + vy) ? 'h' : 'v';
    } else {
      axis = Math.random() < vy / (vx + vy) ? 'v' : 'h';
    }

    if (axis === 'h') {
      direction = velocity.x > 0 ? 'l' : 'r';
    } else {
      direction = velocity.y > 0 ? 't' : 'b';
    }
  }

  star.z = STAR_MIN_SCALE + Math.random() * (1 - STAR_MIN_SCALE);

  if (direction === 'z') {
    star.z = 0.1;
    star.x = Math.random() * width;
    star.y = Math.random() * height;
  } else if (direction === 'l') {
    star.x = -OVERFLOW_THRESHOLD;
    star.y = height * Math.random();
  } else if (direction === 'r') {
    star.x = width + OVERFLOW_THRESHOLD;
    star.y = height * Math.random();
  } else if (direction === 't') {
    star.x = width * Math.random();
    star.y = -OVERFLOW_THRESHOLD;
  } else {
    star.x = width * Math.random();
    star.y = height + OVERFLOW_THRESHOLD;
  }
}

function resize() {
  scale = window.devicePixelRatio || 1;

  width = window.innerWidth * scale;
  height = window.innerHeight * scale;

  canvas.width = width;
  canvas.height = height;

  stars.forEach(placeStar);
}

function step() {
  context.clearRect(0, 0, width, height);

  update();
  renderStars();

  requestAnimationFrame(step);
}

function update() {
  velocity.tx *= 0.96;
  velocity.ty *= 0.96;

  velocity.x += (velocity.tx - velocity.x) * 0.8;
  velocity.y += (velocity.ty - velocity.y) * 0.8;

  stars.forEach(star => {
    star.x += velocity.x * star.z;
    star.y += velocity.y * star.z;

    star.x += (star.x - width / 2) * velocity.z * star.z;
    star.y += (star.y - height / 2) * velocity.z * star.z;

    star.z += velocity.z;

    if (
      star.x < -OVERFLOW_THRESHOLD ||
      star.x > width + OVERFLOW_THRESHOLD ||
      star.y < -OVERFLOW_THRESHOLD ||
      star.y > height + OVERFLOW_THRESHOLD
    ) {
      recycleStar(star);
    }
  });
}

function renderStars() {
  stars.forEach(star => {
    context.beginPath();
    context.lineCap = 'round';
    context.lineWidth = STAR_SIZE * star.z * scale;
    context.globalAlpha = 0.35 + 0.45 * Math.random();
    context.strokeStyle = STAR_COLOR;

    let tailX = velocity.x * 2;
    let tailY = velocity.y * 2;

    if (Math.abs(tailX) < 0.1) tailX = 0.5;
    if (Math.abs(tailY) < 0.1) tailY = 0.5;

    context.moveTo(star.x, star.y);
    context.lineTo(star.x + tailX, star.y + tailY);
    context.stroke();
  });
}

function movePointer(x, y) {
  if (typeof pointerX === 'number' && typeof pointerY === 'number') {
    let ox = x - pointerX;
    let oy = y - pointerY;

    velocity.tx += (ox / (8 * scale)) * (touchInput ? 1 : -1);
    velocity.ty += (oy / (8 * scale)) * (touchInput ? 1 : -1);
  }

  pointerX = x;
  pointerY = y;
}

function onMouseMove(e) {
  touchInput = false;
  movePointer(e.clientX, e.clientY);
}

function onTouchMove(e) {
  touchInput = true;
  movePointer(
    e.touches[0].clientX,
    e.touches[0].clientY
  );

  e.preventDefault();
}

function onMouseLeave() {
  pointerX = null;
  pointerY = null;
}

  // ── STATE ──
  let tasks = JSON.parse(localStorage.getItem('tasks_v1') || '[]');
  let editingId = null;

  // ── DATE ──
  const dateEl = document.getElementById('currentDate');
  const now = new Date();
  dateEl.textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // ── SAVE ──
  function save() {
    localStorage.setItem('tasks_v1', JSON.stringify(tasks));
  }

  // ── RENDER ──
  function render() {
    const list = document.getElementById('taskList');

    const completed = tasks.filter(t => t.done).length;
    const remaining = tasks.length - completed;
    const total = tasks.length;

    const donePct = total > 0 ? (completed / total) * 100 : 0;
    const leftPct = total > 0 ? (remaining / total) * 100 : 0;

    document.getElementById('doneBar').style.width = donePct + '%';
    document.getElementById('leftBar').style.width = leftPct + '%';
    document.getElementById('doneBarWrap').setAttribute('aria-valuenow', completed);
    document.getElementById('doneBarWrap').setAttribute('aria-valuemax', total);
    document.getElementById('leftBarWrap').setAttribute('aria-valuenow', remaining);
    document.getElementById('leftBarWrap').setAttribute('aria-valuemax', total);

    if (tasks.length === 0) {
      list.innerHTML = '<li class="empty-state">Nothing to do. Enjoy your day.</li>';
      return;
    }

    // Preserve existing items, only add/remove/update
    const existingIds = [...list.querySelectorAll('.task-item')].map(el => el.dataset.id);
    const filteredIds = tasks.map(t => t.id);

    // Remove items not in filtered
    existingIds.forEach(id => {
      if (!filteredIds.includes(id)) {
        const el = list.querySelector(`[data-id="${id}"]`);
        if (el) {
          el.classList.add('removing');
          el.addEventListener('animationend', () => el.remove(), { once: true });
        }
      }
    });

    // Add/update items
    tasks.forEach((task, index) => {
      const existing = list.querySelector(`[data-id="${task.id}"]`);

      if (existing) {
        // Update state without re-rendering
        if (task.done) existing.classList.add('completed');
        else existing.classList.remove('completed');

        const textEl = existing.querySelector('.task-text');
        if (textEl && textEl.textContent !== task.text) textEl.textContent = task.text;
      } else {
        // Create new item
        const li = createTaskEl(task);
        const emptyState = list.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        // Insert at correct position
        const items = [...list.querySelectorAll('.task-item:not(.removing)')];
        if (index >= items.length) {
          list.appendChild(li);
        } else {
          list.insertBefore(li, items[index]);
        }
      }
    });
  }

  function createTaskEl(task) {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' completed' : '');
    li.dataset.id = task.id;
    li.setAttribute('role', 'listitem');

    li.innerHTML = `
      <button class="task-check" aria-label="${task.done ? 'Mark incomplete' : 'Mark complete'}" tabindex="0">
        <span class="check-inner" aria-hidden="true">
          <svg viewBox="0 0 12 10"><polyline points="1.5,5 5,8.5 10.5,1.5"/></svg>
        </span>
      </button>
      <div class="task-text-wrap">
        <span class="task-text" title="${escHtml(task.text)}">${escHtml(task.text)}</span>
      </div>
      <button class="task-delete" aria-label="Delete task" tabindex="0">
        <svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
      </button>
    `;

    // Make entire task item clickable to toggle completion (except delete button)
    li.addEventListener('click', (e) => {
      if (!e.target.closest('.task-delete')) {
        toggleTask(task.id);
      }
    });

    // Delete
    li.querySelector('.task-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteTask(task.id, li);
    });

    // Double-click to edit
    li.querySelector('.task-text').addEventListener('dblclick', (e) => {
      e.stopPropagation();
      startEdit(task.id, li);
    });

    return li;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ACTIONS ──
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;

    const task = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      text,
      done: false,
      createdAt: Date.now()
    };

    tasks.unshift(task);
    save();
    input.value = '';
    render();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    save();
    render();
  }

  function deleteTask(id, el) {
    el.classList.add('removing');
    el.addEventListener('animationend', () => {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }, { once: true });
  }

  function startEdit(id, li) {
    if (editingId) finishEdit();
    editingId = id;

    const task = tasks.find(t => t.id === id);
    if (!task) return;

    const textWrap = li.querySelector('.task-text-wrap');
    const textEl = li.querySelector('.task-text');
    const originalText = task.text;

    const editInput = document.createElement('input');
    editInput.type = 'text';
    editInput.className = 'task-edit-input';
    editInput.value = originalText;
    editInput.maxLength = 200;

    textWrap.replaceChild(editInput, textEl);
    editInput.focus();
    editInput.select();

    function commit() {
      const val = editInput.value.trim();
      if (val && val !== originalText) {
        task.text = val;
        save();
      }
      editingId = null;
      textEl.textContent = task.text;
      textWrap.replaceChild(textEl, editInput);
    }

    editInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') {
        editingId = null;
        textWrap.replaceChild(textEl, editInput);
      }
    });

    editInput.addEventListener('blur', commit);
  }

  function finishEdit() {
    const activeInput = document.querySelector('.task-edit-input');
    if (activeInput) activeInput.blur();
  }

  // ── EVENT LISTENERS ──
  document.getElementById('addBtn').addEventListener('click', addTask);

  document.getElementById('taskInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTask();
  });

  // ── INIT ──
  render();
</script>
</body>
</html>
